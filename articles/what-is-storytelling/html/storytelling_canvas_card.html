<section class="cc-canvas-card" data-module="storytelling-canvas">
  <h2>Storytelling Canvas Audit</h2>
  <p>This card displays narrative coherence, craft score, governance risk, and review priority for a storytelling item.</p>
  <div class="cc-canvas-card-grid">
    <div><strong>Coherence</strong><span data-field="coherence_score"></span></div>
    <div><strong>Craft</strong><span data-field="craft_score"></span></div>
    <div><strong>Governance risk</strong><span data-field="governance_risk"></span></div>
    <div><strong>Review</strong><span data-field="review_priority"></span></div>
  </div>
</section>
