<section class="cc-canvas-card" data-module="aristotelian-plot-canvas">
  <h2>Aristotelian Plot Canvas Audit</h2>
  <p>This card displays plot unity, reversal-recognition strength, formula risk, governance score, and review priority for a plot item.</p>
  <div class="cc-canvas-card-grid">
    <div><strong>Plot unity</strong><span data-field="plot_unity"></span></div>
    <div><strong>Reversal/recognition</strong><span data-field="reversal_recognition_strength"></span></div>
    <div><strong>Formula risk</strong><span data-field="formula_risk"></span></div>
    <div><strong>Review</strong><span data-field="review_priority"></span></div>
  </div>
</section>
