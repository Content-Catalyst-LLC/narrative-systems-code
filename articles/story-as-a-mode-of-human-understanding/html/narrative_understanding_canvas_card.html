<section class="cc-canvas-card" data-module="narrative-understanding-canvas">
  <h2>Narrative Understanding Canvas Audit</h2>
  <p>This card displays understanding score, moral understanding, possible-world value, overreach risk, and review priority for a narrative item.</p>
  <div class="cc-canvas-card-grid">
    <div><strong>Understanding</strong><span data-field="understanding_score"></span></div>
    <div><strong>Moral understanding</strong><span data-field="moral_understanding_score"></span></div>
    <div><strong>Overreach risk</strong><span data-field="overreach_risk"></span></div>
    <div><strong>Review</strong><span data-field="review_priority"></span></div>
  </div>
</section>
