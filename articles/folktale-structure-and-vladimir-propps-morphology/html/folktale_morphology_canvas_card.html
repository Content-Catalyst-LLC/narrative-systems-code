  <div class="cc-canvas-card-grid">
    <div><strong>Function coverage</strong><span data-field="function_coverage"></span></div>
    <div><strong>Sequence integrity</strong><span data-field="sequence_integrity"></span></div>
    <div><strong>Context balance</strong><span data-field="morphology_context_balance"></span></div>
    <div><strong>Reduction risk</strong><span data-field="reduction_risk"></span></div>
  </div>
</section>
