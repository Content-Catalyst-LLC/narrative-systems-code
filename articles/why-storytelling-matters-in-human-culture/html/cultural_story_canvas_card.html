<section class="cc-canvas-card" data-module="cultural-story-canvas">
  <h2>Cultural Storytelling Canvas Audit</h2>
  <p>This card displays cultural value, transmission strength, narrative risk, and review priority for a cultural story item.</p>
  <div class="cc-canvas-card-grid">
    <div><strong>Cultural value</strong><span data-field="cultural_value_score"></span></div>
    <div><strong>Transmission</strong><span data-field="transmission_score"></span></div>
    <div><strong>Narrative risk</strong><span data-field="narrative_risk"></span></div>
    <div><strong>Review</strong><span data-field="review_priority"></span></div>
  </div>
</section>
